<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Netflix Clone</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#000;
      color:#fff;
    }

    /* Background */
    .hero{
      height:100vh;
      background:
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
        url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4?q=80&w=1600&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      position:relative;
    }

    /* Navbar */
    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 60px;
    }

    .logo{
      color:#e50914;
      font-size:40px;
      font-weight:bold;
      letter-spacing:1px;
    }

    .btn{
      background:#e50914;
      color:#fff;
      border:none;
      padding:10px 18px;
      border-radius:4px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
    }

    /* Hero content */
    .content{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      text-align:center;
      width:90%;
      max-width:900px;
    }

    .content h1{
      font-size:56px;
      margin-bottom:20px;
      line-height:1.1;
    }

    .content h2{
      font-size:26px;
      font-weight:400;
      margin-bottom:20px;
    }

    .content p{
      font-size:20px;
      margin-bottom:25px;
    }

    .email-box{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .email-box input{
      padding:16px;
      width:350px;
      border:none;
      border-radius:4px;
      font-size:16px;
    }

    .email-box button{
      padding:16px 24px;
      font-size:18px;
    }

    /* Movie section */
    .section{
      padding:50px 60px;
      border-top:8px solid #222;
    }

    .section h2{
      font-size:32px;
      margin-bottom:25px;
    }

    .movies{
      display:flex;
      gap:18px;
      overflow-x:auto;
      padding-bottom:10px;
    }

    .movie{
      min-width:220px;
      height:320px;
      border-radius:8px;
      overflow:hidden;
      background:#111;
      transition:transform 0.3s;
    }

    .movie:hover{
      transform:scale(1.05);
    }

    .movie img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    footer{
      border-top:8px solid #222;
      padding:30px;
      text-align:center;
      color:#999;
      font-size:14px;
    }

    @media(max-width:768px){
      nav{
        padding:20px;
      }

      .content h1{
        font-size:38px;
      }

      .content h2{
        font-size:22px;
      }

      .email-box input{
        width:100%;
      }

      .section{
        padding:40px 20px;
      }
    }
  </style>
</head>
<body>

  <div class="hero">
    <nav>
      <div class="logo">NETFLIX</div>
      <button class="btn">Sign In</button>
    </nav>

    <div class="content">
      <h1>Unlimited movies, TV shows and more</h1>
      <h2>Watch anywhere. Cancel anytime.</h2>
      <p>Ready to watch? Enter your email to create or restart your membership.</p>

      <div class="email-box">
        <input type="email" placeholder="Email address" />
        <button class="btn">Get Started ></button>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Trending Now</h2>
    <div class="movies">
      <div class="movie">
        <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=600&auto=format&fit=crop" alt="Movie 1">
      </div>
      <div class="movie">
        <img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=600&auto=format&fit=crop" alt="Movie 2">
      </div>
      <div class="movie">
        <img src="https://images.unsplash.com/photo-1516280440614-37939bbacd81?q=80&w=600&auto=format&fit=crop" alt="Movie 3">
      </div>
      <div class="movie">
        <img src="https://images.unsplash.com/photo-1513106580091-1d82408b8cd6?q=80&w=600&auto=format&fit=crop" alt="Movie 4">
      </div>
    </div>
  </div>

  <footer>
    <p>Netflix Clone © 2026 | Made with HTML & CSS</p>
  </footer>

</body>
</html>
